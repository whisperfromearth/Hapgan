<!DOCTYPE html>

<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>합간</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0a0a0a;color:#e8e8e8;font-family:'Courier New',monospace;min-height:100vh}
    #root{max-width:480px;margin:0 auto;padding:28px 20px 60px}
    input,button{font-family:'Courier New',monospace}
    .btn{width:100%;padding:14px;margin-top:10px;background:#7c6af7;border:none;border-radius:12px;cursor:pointer;color:#fff;font-size:12px;letter-spacing:.2em;text-transform:uppercase}
    .btn:disabled{background:#1a1a1a;border:1px solid #2a2a2a;color:#333;cursor:default}
    .input{width:100%;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:12px 14px;color:#e8e8e8;font-size:13px;outline:none}
    .card{background:#111;border:1px solid #1e1e1e;border-radius:14px;padding:18px 20px;margin-bottom:12px}
    .label{font-size:10px;color:#555;letter-spacing:.25em;text-transform:uppercase;margin-bottom:6px;display:block}
    .tabs{display:flex;border-bottom:1px solid #1e1e1e;margin-bottom:24px}
    .tab{flex:1;background:none;border:none;border-bottom:2px solid transparent;padding:8px 0 12px;font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:#333;cursor:pointer}
    .tab.on{color:#7c6af7;border-bottom-color:#7c6af7}
    .role-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
    .role-btn{padding:12px 0;border-radius:10px;border:1px solid #2a2a2a;background:#1a1a1a;color:#555;cursor:pointer;font-size:12px}
    .role-btn.on{border-color:#7c6af7;background:#7c6af722;color:#7c6af7}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
    .cal-day{aspect-ratio:1;border-radius:8px;border:none;background:transparent;color:#e8e8e8;cursor:pointer;font-size:12px}
    .cal-day.sel{background:#7c6af7;color:#fff;font-weight:bold}
    .cal-day.past{color:#222;cursor:default}
    .cal-day.sun{color:#f87171}.cal-day.sat{color:#9b8ff7}
    .status-row{display:flex;gap:8px;margin-top:12px}
    .status-btn{flex:1;padding:9px 0;border-radius:8px;border:1px solid #2a2a2a;background:#1a1a1a;color:#444;cursor:pointer;font-size:11px}
    .modal-bg{position:fixed;inset:0;background:#000c;z-index:100;display:flex;align-items:flex-end}
    .modal{background:#111;border-radius:20px 20px 0 0;padding:28px 24px 48px;width:100%;border:1px solid #222}
    .dur-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px}
    .dur-btn{padding:7px 14px;border-radius:8px;border:1px solid #2a2a2a;background:#1a1a1a;color:#444;cursor:pointer;font-size:12px}
    .dur-btn.on{border-color:#7c6af7;background:#7c6af722;color:#7c6af7}
    .err{font-size:11px;color:#f87171;margin:8px 0}
    .logo span:first-child{color:#7c6af7}
    @keyframes spin{to{transform:rotate(360deg)}}
    .spinner{width:28px;height:28px;border:2px solid #1e1e1e;border-top-color:#7c6af7;border-radius:50%;animation:spin .8s linear infinite;margin:80px auto}
  </style>
</head>
<body>
<div id="root"></div>
<script>
// ── Supabase
const SB_URL = "https://tjjhkddtfyoyshgtlvsl.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRqamhrZGR0ZnlveXNoZ3RsdnNsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyODgxNzUsImV4cCI6MjA4ODg2NDE3NX0.ivy7wL_0xBqGynZZrS4MrIkPMQT15pPGMrnu0OJUb9Q";
async function sb(path, o={}) {
  const h = {"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json","Accept":"application/json"};
  if(o.prefer||o.method) h["Prefer"]=o.prefer||"return=representation";
  const r = await fetch(SB_URL+"/rest/v1/"+path,{method:o.method||"GET",headers:h,body:o.body});
  if(!r.ok) throw new Error((await r.text()));
  const t=await r.text(); return t?JSON.parse(t):null;
}

// ── 상수
const ROLES=[“보컬”,“기타”,“베이스”,“드럼”,“키보드”,“세션”,“기타(other)”];
const EMO={“보컬”:“🎤”,“기타”:“🎸”,“베이스”:“🎵”,“드럼”:“🥁”,“키보드”:“🎹”,“세션”:“🎙️”,“기타(other)”:“🎶”};
const DAYS=[“일”,“월”,“화”,“수”,“목”,“금”,“토”];
const MONTHS=[“1월”,“2월”,“3월”,“4월”,“5월”,“6월”,“7월”,“8월”,“9월”,“10월”,“11월”,“12월”];
const SC={“ok”:”#4ade80”,“maybe”:”#facc15”,“no”:”#f87171”};
const SL={“ok”:“됨”,“maybe”:“애매”,“no”:“안됨”};
const DURS=[1,1.5,2,2.5,3,3.5,4];

function pad(n){return String(n).padStart(2,“0”)}
function dkey(d){return d.y+”-”+d.m+”-”+d.d}
function fmtDate(y,m,d){return (m+1)+“월 “+d+“일 (”+DAYS[new Date(y,m,d).getDay()]+”)”}
function fmtTime(t){
if(!t) return “시간 미정”;
const em=t.h*60+parseInt(t.m)+t.dur*60;
return pad(t.h)+”:”+t.m+” → “+pad(Math.floor(em/60)%24)+”:”+pad(em%60)+” (”+t.dur+“시간)”;
}
function genId(){return Math.random().toString(36).slice(2,8).toUpperCase()}

// ── 상태
let state = {
screen:“landing”, loading:false, error:null,
bandName:””, sessionTitle:””, setupStep:“info”,
selDates:[], dtMap:{}, timeModalDate:null, roomId:null,
loginStep:“name”, myName:””, myRole:””,
dates:[], votes:{}, myVotes:{}, confirmed:null,
view:“vote”, roomInfo:null, inviteCopied:false, submitted:false,
timeHour:14, timeMin:“00”, timeDur:2,
};

function set(patch){state={…state,…patch};render()}

// 초기화: URL 해시 확인
const hash=location.hash.replace(”#”,””);
if(hash){state.roomId=hash;state.screen=“login”;}

async function loadRoom(rid){
set({loading:true,error:null});
try{
const [room,ds,vs]=await Promise.all([
sb(“rooms?id=eq.”+rid+”&select=*”),
sb(“dates?room_id=eq.”+rid+”&select=*&order=id”),
sb(“votes?room_id=eq.”+rid+”&select=*”),
]);
if(!room||!room.length){set({loading:false,error:“방을 찾을 수 없어 😢”});return;}
const vm={};
for(const v of vs){if(!vm[v.member_name])vm[v.member_name]={};vm[v.member_name][v.date_id]=v.status;}
set({loading:false,roomInfo:room[0],dates:ds.map(d=>({id:d.id,date:d.date,time:d.time})),votes:vm});
}catch(e){set({loading:false,error:“로드 실패: “+e.message});}
}

async function createRoom(){
set({loading:true,error:null});
try{
const id=genId();
await sb(“rooms”,{method:“POST”,body:JSON.stringify({id,band_name:state.bandName,session_title:state.sessionTitle})});
const sorted=[…state.selDates].sort((a,b)=>new Date(a.y,a.m,a.d)-new Date(b.y,b.m,b.d));
for(const d of sorted){
const t=state.dtMap[dkey(d)];
await sb(“dates”,{method:“POST”,body:JSON.stringify({room_id:id,date:fmtDate(d.y,d.m,d.d),time:fmtTime(t)})});
}
location.hash=id;
await loadRoom(id);
set({screen:“login”,roomId:id});
}catch(e){set({loading:false,error:“방 만들기 실패: “+e.message});}
}

async function submitVote(){
set({loading:true,error:null});
try{
for(const [did,status] of Object.entries(state.myVotes)){
const ex=await sb(“votes?room_id=eq.”+state.roomId+”&date_id=eq.”+did+”&member_name=eq.”+encodeURIComponent(state.myName)+”&select=id”);
if(ex&&ex.length){
await sb(“votes?id=eq.”+ex[0].id,{method:“PATCH”,prefer:“return=minimal”,body:JSON.stringify({status})});
}else{
await sb(“votes”,{method:“POST”,body:JSON.stringify({room_id:state.roomId,date_id:parseInt(did),member_name:state.myName,member_role:state.myRole,status})});
}
}
const nv={…state.votes,[state.myName]:{…state.myVotes}};
set({loading:false,votes:nv,submitted:true,view:“result”});
}catch(e){set({loading:false,error:“투표 실패: “+e.message});}
}

function toggleDate(d){
const exists=state.selDates.find(s=>s.y===d.y&&s.m===d.m&&s.d===d.d);
if(exists){
const dm={…state.dtMap}; delete dm[dkey(d)];
set({selDates:state.selDates.filter(s=>!(s.y===d.y&&s.m===d.m&&s.d===d.d)),dtMap:dm});
}else{
set({selDates:[…state.selDates,d],timeModalDate:d,timeHour:14,timeMin:“00”,timeDur:2});
}
}

function scoreFor(dateId){return Object.values(state.votes).filter(v=>v[dateId]===“ok”).length;}

// ── 렌더링
function el(tag,attrs,…children){
const e=document.createElement(tag);
for(const [k,v] of Object.entries(attrs||{})){
if(k===“style”&&typeof v===“object”) Object.assign(e.style,v);
else if(k.startsWith(“on”)) e.addEventListener(k.slice(2).toLowerCase(),v);
else if(k===“className”) e.className=v;
else if(k===“value”&&(tag===“input”||tag===“textarea”)) e.value=v;
else if(k===“placeholder”) e.placeholder=v;
else if(k===“disabled”) e.disabled=v;
else if(k===“type”) e.type=v;
else e.setAttribute(k,v);
}
for(const c of children.flat()){
if(c==null||c===false) continue;
e.appendChild(typeof c===“string”||typeof c===“number”?document.createTextNode(c):c);
}
return e;
}

function logo(size=14){
const d=el(“div”,{style:{fontSize:size,fontWeight:900,letterSpacing:”-.02em”}});
d.appendChild(el(“span”,{style:{color:”#7c6af7”}},“합”));
d.appendChild(el(“span”,{style:{color:”#e8e8e8”}},“간”));
return d;
}

function renderLanding(){
return el(“div”,{style:{minHeight:“100vh”,display:“flex”,flexDirection:“column”,justifyContent:“space-between”,paddingTop:“44px”}},
el(“div”,{},
el(“div”,{style:{fontSize:“80px”,fontWeight:900,lineHeight:.9,letterSpacing:”-.05em”,marginBottom:“8px”}},
el(“span”,{style:{color:”#7c6af7”}},“합”),
el(“span”,{style:{color:”#e8e8e8”}},“간”)
),
el(“p”,{style:{color:”#555”,fontSize:“11px”,letterSpacing:”.3em”}},“합주를 간단히”),
el(“p”,{style:{color:”#333”,fontSize:“12px”,marginTop:“24px”,lineHeight:“2.2”}},“날짜 후보 등록 → 멤버 투표 → 합주 확정”)
),
el(“div”,{style:{paddingBottom:“24px”}},
el(“button”,{className:“btn”,style:{fontSize:“13px”,padding:“18px”,marginTop:“0”},onClick:()=>set({screen:“setup”,setupStep:“info”})},“🎸 합주방 만들기”)
)
);
}

function renderSetup(){
const s=state;
const back=el(“button”,{style:{background:“none”,border:“none”,color:”#555”,cursor:“pointer”,fontSize:“12px”,marginBottom:“28px”,padding:“0”},onClick:()=>s.setupStep===“info”?set({screen:“landing”}):set({setupStep:“info”})},“← 뒤로”);

if(s.setupStep===“info”){
const inp1=el(“input”,{className:“input”,placeholder:“예) MRDW 무릉도원”,value:s.bandName,style:{marginBottom:“16px”},onInput:e=>set({bandName:e.target.value})});
const inp2=el(“input”,{className:“input”,placeholder:“예) 3월 합주”,value:s.sessionTitle,onInput:e=>set({sessionTitle:e.target.value})});
const btn=el(“button”,{className:“btn”,disabled:!(s.bandName.trim()&&s.sessionTitle.trim()),onClick:()=>set({setupStep:“calendar”})},“다음 — 날짜 선택”);
return el(“div”,{},back,
el(“div”,{style:{fontSize:“10px”,color:”#7c6af7”,letterSpacing:”.3em”,marginBottom:“8px”}},“STEP 1”),
el(“h2”,{style:{fontSize:“22px”,fontWeight:“bold”,margin:“0 0 24px”}},“밴드 정보”),
el(“span”,{className:“label”},“밴드 이름”),inp1,
el(“span”,{className:“label”},“합주 이름”),inp2,btn
);
}

// calendar step
const today=new Date();
let cy=s._cy||today.getFullYear(), cm=s.*cm||today.getMonth();
const dim=new Date(cy,cm+1,0).getDate();
const fd=new Date(cy,cm,1).getDay();
const cells=[…Array(fd).fill(null),…Array.from({length:dim},(*,i)=>i+1)];

const calDays=el(“div”,{className:“cal-grid”},
…DAYS.map((d,i)=>el(“div”,{style:{textAlign:“center”,fontSize:“10px”,color:i===0?”#f87171”:i===6?”#9b8ff7”:”#444”,padding:“4px 0”}},d))
);
const calCells=el(“div”,{className:“cal-grid”},
…cells.map((day,i)=>{
const dow=i%7;
const isPast=day&&(()=>{const dt=new Date(cy,cm,day);dt.setHours(0,0,0,0);const t=new Date();t.setHours(0,0,0,0);return dt<t;})();
const isSel=day&&s.selDates.some(sd=>sd.y===cy&&sd.m===cm&&sd.d===day);
let cls=“cal-day”;
if(isSel)cls+=” sel”;else if(!day||isPast)cls+=” past”;else if(dow===0)cls+=” sun”;else if(dow===6)cls+=” sat”;
return el(“button”,{className:cls,onClick:()=>!isPast&&day&&toggleDate({y:cy,m:cm,d:day})},day||””);
})
);

const selList=s.selDates.length?el(“div”,{style:{marginBottom:“12px”}},
el(“span”,{className:“label”},“선택됨 “+s.selDates.length+“개”),
…[…s.selDates].sort((a,b)=>new Date(a.y,a.m,a.d)-new Date(b.y,b.m,b.d)).map(d=>{
const t=s.dtMap[dkey(d)];
return el(“div”,{style:{display:“flex”,alignItems:“center”,gap:“8px”,background:”#1a1a1a”,border:“1px solid “+(t?”#7c6af733”:”#f8717133”),borderRadius:“10px”,padding:“10px 14px”,marginBottom:“6px”}},
el(“div”,{style:{flex:1}},
el(“div”,{style:{fontSize:“12px”,color:”#aaa”}},fmtDate(d.y,d.m,d.d)),
el(“div”,{style:{fontSize:“11px”,color:t?”#7c6af7”:”#f87171”,marginTop:“2px”}},t?fmtTime(t):“⚠ 시간 미설정”)
),
el(“button”,{style:{background:“none”,border:“1px solid #2a2a2a”,borderRadius:“6px”,color:”#555”,cursor:“pointer”,fontSize:“10px”,padding:“4px 8px”},onClick:()=>set({timeModalDate:d,timeHour:t?t.h:14,timeMin:t?t.m:“00”,timeDur:t?t.dur:2})},“수정”),
el(“button”,{style:{background:“none”,border:“none”,color:”#444”,cursor:“pointer”,fontSize:“16px”,padding:“0”},onClick:()=>toggleDate(d)},“×”)
);
})
):null;

const allReady=s.selDates.length>0&&s.selDates.every(d=>s.dtMap[dkey(d)]);
const createBtn=el(“button”,{className:“btn”,disabled:!allReady||s.loading,onClick:createRoom},s.loading?“만드는 중…”:“완료 — 합주방 만들기 🎸”);

const modal=s.timeModalDate?renderTimeModal():null;

return el(“div”,{},back,
el(“div”,{style:{fontSize:“10px”,color:”#7c6af7”,letterSpacing:”.3em”,marginBottom:“8px”}},“STEP 2”),
el(“h2”,{style:{fontSize:“22px”,fontWeight:“bold”,margin:“0 0 4px”}},“날짜 + 시간 선택”),
el(“p”,{style:{color:”#444”,fontSize:“12px”,marginBottom:“20px”}},“날짜 누르면 시간도 바로 설정돼”),
el(“div”,{className:“card”},
el(“div”,{style:{display:“flex”,justifyContent:“space-between”,alignItems:“center”,marginBottom:“16px”}},
el(“button”,{style:{background:“none”,border:“none”,color:”#555”,cursor:“pointer”,fontSize:“20px”,padding:“4px 10px”},onClick:()=>set({_cm:cm===0?11:cm-1,_cy:cm===0?cy-1:cy})},”‹”),
el(“span”,{style:{fontSize:“14px”,fontWeight:“bold”}},cy+“년 “+MONTHS[cm]),
el(“button”,{style:{background:“none”,border:“none”,color:”#555”,cursor:“pointer”,fontSize:“20px”,padding:“4px 10px”},onClick:()=>set({_cm:cm===11?0:cm+1,_cy:cm===11?cy+1:cy})},”›”)
),
calDays,calCells
),
selList,
s.error?el(“div”,{className:“err”},s.error):null,
createBtn,
modal
);
}

function renderTimeModal(){
const s=state;
const d=s.timeModalDate;
if(!d) return null;
const em=s.timeHour*60+parseInt(s.timeMin)+s.timeDur*60;
const preview=pad(s.timeHour)+”:”+s.timeMin+” → “+pad(Math.floor(em/60)%24)+”:”+pad(em%60)+” (”+s.timeDur+“시간)”;

const hourSel=el(“select”,{style:{background:”#1a1a1a”,border:“1px solid #2a2a2a”,borderRadius:“8px”,color:”#e8e8e8”,padding:“8px 12px”,fontSize:“16px”},onChange:e=>set({timeHour:parseInt(e.target.value)})},
…Array.from({length:16},(_,i)=>i+8).map(h=>{ const o=el(“option”,{value:h},pad(h)+“시”); if(h===s.timeHour)o.selected=true; return o; })
);
const minSel=el(“select”,{style:{background:”#1a1a1a”,border:“1px solid #2a2a2a”,borderRadius:“8px”,color:”#e8e8e8”,padding:“8px 12px”,fontSize:“16px”},onChange:e=>set({timeMin:e.target.value})},
…[“00”,“15”,“30”,“45”].map(m=>{ const o=el(“option”,{value:m},m+“분”); if(m===s.timeMin)o.selected=true; return o; })
);

return el(“div”,{className:“modal-bg”,onClick:()=>set({timeModalDate:null})},
el(“div”,{className:“modal”,onClick:e=>e.stopPropagation()},
el(“div”,{style:{fontSize:“11px”,color:”#555”,marginBottom:“4px”}},fmtDate(d.y,d.m,d.d)),
el(“div”,{style:{fontSize:“16px”,fontWeight:“bold”,marginBottom:“20px”}},“시간 설정”),
el(“div”,{style:{fontSize:“10px”,color:”#555”,letterSpacing:”.2em”,marginBottom:“10px”}},“시작 시간”),
el(“div”,{style:{display:“flex”,gap:“12px”,marginBottom:“20px”,justifyContent:“center”}},hourSel,minSel),
el(“div”,{style:{fontSize:“10px”,color:”#555”,letterSpacing:”.2em”,marginBottom:“10px”}},“합주 시간”),
el(“div”,{className:“dur-row”},
…DURS.map(dur=>el(“button”,{className:“dur-btn”+(s.timeDur===dur?” on”:””),onClick:()=>set({timeDur:dur})},dur+“시간”))
),
el(“div”,{style:{background:”#1a1a1a”,borderRadius:“10px”,padding:“12px”,textAlign:“center”,marginBottom:“20px”,fontSize:“16px”,fontWeight:“bold”}},preview),
el(“button”,{className:“btn”,style:{marginTop:“0”},onClick:()=>{
const dm={…s.dtMap,[dkey(d)]:{h:s.timeHour,m:s.timeMin,dur:s.timeDur}};
set({dtMap:dm,timeModalDate:null});
}},“확인”)
)
);
}

function renderLogin(){
const s=state;
if(s.loading) return el(“div”,{},el(“div”,{className:“spinner”}));
const back=el(“button”,{style:{background:“none”,border:“none”,color:”#555”,cursor:“pointer”,fontSize:“12px”,marginBottom:“28px”,padding:“0”},onClick:()=>{set({screen:“landing”});location.hash=””;}});
back.textContent=“← 뒤로”;

if(s.loginStep===“name”){
const inp=el(“input”,{className:“input”,placeholder:“예) 이지구”,value:s.myName,onInput:e=>set({myName:e.target.value})});
return el(“div”,{},back,logo(),
s.roomInfo?el(“div”,{style:{fontSize:“11px”,color:”#555”,margin:“8px 0 20px”}},s.roomInfo.band_name+” · “+s.roomInfo.session_title):null,
el(“h2”,{style:{fontSize:“22px”,fontWeight:“bold”,margin:“0 0 4px”}},“이름을 알려줘”),
el(“p”,{style:{color:”#444”,fontSize:“12px”,marginBottom:“28px”}},“합주 일정에 참여하려면 이름이 필요해”),
el(“span”,{className:“label”},“이름”),inp,
el(“button”,{className:“btn”,disabled:!s.myName.trim(),onClick:()=>s.myName.trim()&&set({loginStep:“role”})},“다음”)
);
}

return el(“div”,{},back,logo(),
el(“h2”,{style:{fontSize:“22px”,fontWeight:“bold”,margin:“16px 0 4px”}},“포지션은?”),
el(“p”,{style:{color:”#444”,fontSize:“12px”,marginBottom:“28px”}},“밴드에서 어떤 파트야?”),
el(“div”,{className:“role-grid”},
…ROLES.map(r=>el(“button”,{className:“role-btn”+(s.myRole===r?” on”:””),onClick:()=>set({myRole:r})},EMO[r]+” “+r))
),
el(“button”,{className:“btn”,disabled:!s.myRole,onClick:async()=>{if(s.myRole){await loadRoom(s.roomId);set({screen:“app”});}}},“참여하기”)
);
}

function renderApp(){
const s=state;
const best=s.dates.length?s.dates.reduce((b,d)=>scoreFor(d.id)>=scoreFor(b.id)?d:b):null;
const invLink=s.roomId?location.origin+location.pathname+”#”+s.roomId:””;

const header=el(“div”,{style:{marginBottom:“24px”}},
el(“div”,{style:{display:“flex”,justifyContent:“space-between”,alignItems:“flex-start”}},
el(“div”,{},logo(),
el(“h1”,{style:{fontSize:“20px”,fontWeight:“bold”,margin:“4px 0 0”,lineHeight:“1.2”}},
(s.roomInfo?.band_name||s.bandName)+” “,
el(“span”,{style:{color:”#7c6af7”}},s.roomInfo?.session_title||s.sessionTitle)
)
),
el(“button”,{style:{background:“none”,border:“1px solid #2a2a2a”,borderRadius:“8px”,padding:“6px 10px”,color:”#555”,cursor:“pointer”,fontSize:“11px”},onClick:()=>loadRoom(s.roomId)},“↻”)
),
el(“p”,{style:{color:”#333”,fontSize:“11px”,marginTop:“6px”}},“방 코드: “,el(“span”,{style:{color:”#7c6af7”}},s.roomId),” · 날짜 “+s.dates.length+“개”)
);

const tabs=el(“div”,{className:“tabs”},
…[“vote”,“result”,“members”].map(t=>el(“button”,{className:“tab”+(s.view===t?” on”:””),onClick:()=>set({view:t})},t===“vote”?“내 일정”:t===“result”?“현황”:“멤버”))
);

let content;
if(s.view===“vote”){
if(s.submitted){
content=el(“div”,{style:{textAlign:“center”,paddingTop:“40px”}},
el(“div”,{style:{fontSize:“32px”,marginBottom:“12px”}},“✅”),
el(“div”,{style:{fontSize:“16px”,fontWeight:“bold”,marginBottom:“8px”}},“투표 완료!”),
el(“div”,{style:{fontSize:“12px”,color:”#555”,marginBottom:“24px”}},“현황 탭에서 결과 확인해봐”),
el(“button”,{className:“btn”,style:{marginTop:“0”},onClick:()=>set({submitted:false})},“다시 수정하기”)
);
}else{
content=el(“div”,{},
el(“p”,{style:{fontSize:“11px”,color:”#444”,marginBottom:“16px”}},s.myName+“님, 각 날짜 가능 여부를 선택해줘”),
…s.dates.map(d=>el(“div”,{className:“card”,style:{borderColor:s.myVotes[d.id]===“ok”?”#4ade8033”:s.myVotes[d.id]===“maybe”?”#facc1533”:”#1e1e1e”}},
el(“div”,{style:{display:“flex”,justifyContent:“space-between”,alignItems:“center”}},
el(“div”,{},el(“div”,{style:{fontSize:“14px”,fontWeight:“bold”}},d.date),el(“div”,{style:{fontSize:“11px”,color:”#444”,marginTop:“2px”}},d.time)),
el(“div”,{style:{fontSize:“10px”,padding:“3px 8px”,borderRadius:“20px”,background:”#1a1a1a”,color:”#555”}},scoreFor(d.id)+“명 가능”)
),
el(“div”,{className:“status-row”},
…[“ok”,“maybe”,“no”].map(sv=>el(“button”,{className:“status-btn”,
style:{borderColor:s.myVotes[d.id]===sv?SC[sv]:”#2a2a2a”,background:s.myVotes[d.id]===sv?SC[sv]+“22”:”#1a1a1a”,color:s.myVotes[d.id]===sv?SC[sv]:”#444”},
onClick:()=>set({myVotes:{…s.myVotes,[d.id]:sv}})},SL[sv]))
)
)),
s.error?el(“div”,{className:“err”},s.error):null,
el(“button”,{className:“btn”,disabled:!s.dates.every(d=>s.myVotes[d.id])||s.loading,onClick:submitVote},s.loading?“제출 중…”:“제출하기”)
);
}
}else if(s.view===“result”){
content=el(“div”,{},
best?el(“div”,{style:{background:“linear-gradient(135deg,#7c6af722,#4ade8011)”,border:“1px solid #7c6af733”,borderRadius:“14px”,padding:“18px 20px”,marginBottom:“20px”}},
el(“div”,{style:{fontSize:“10px”,color:”#7c6af7”,letterSpacing:”.3em”,marginBottom:“6px”}},“BEST DATE”),
el(“div”,{style:{fontSize:“18px”,fontWeight:“bold”}},best.date),
el(“div”,{style:{fontSize:“12px”,color:”#666”,marginTop:“2px”}},best.time+” · “+scoreFor(best.id)+“명 가능”),
!s.confirmed
?el(“button”,{style:{marginTop:“14px”,padding:“8px 20px”,background:”#7c6af7”,border:“none”,borderRadius:“8px”,color:”#fff”,fontSize:“11px”,cursor:“pointer”},onClick:()=>set({confirmed:best})},“이 날로 확정 ✓”)
:el(“div”,{style:{marginTop:“12px”,fontSize:“12px”,color:”#4ade80”}},“✓ “+s.confirmed.date+” 합주 확정!”)
):null,
…s.dates.map(d=>el(“div”,{className:“card”},
el(“div”,{style:{display:“flex”,justifyContent:“space-between”,marginBottom:“12px”}},
el(“span”,{style:{fontSize:“13px”,fontWeight:“bold”}},d.date),
el(“span”,{style:{fontSize:“12px”,color:”#555”}},scoreFor(d.id)+”/”+Object.keys(s.votes).length+“명”)
),
el(“div”,{style:{fontSize:“11px”,color:”#555”,marginBottom:“6px”}},d.time),
…Object.keys(s.votes).length===0
?[el(“div”,{style:{fontSize:“11px”,color:”#333”}},“아직 투표한 멤버가 없어”)]
:Object.keys(s.votes).map(name=>{
const v=s.votes[name]?.[d.id];
return el(“div”,{style:{display:“flex”,alignItems:“center”,gap:“10px”,marginBottom:“6px”}},
el(“span”,{style:{fontSize:“12px”,flex:1,color:”#aaa”}},name+(name===s.myName?” (나)”:””)),
el(“span”,{style:{fontSize:“10px”,padding:“2px 8px”,borderRadius:“10px”,background:v?SC[v]+“22”:”#1a1a1a”,color:v?SC[v]:”#333”}},v?SL[v]:“미응답”)
);
})
))
);
}else{
content=el(“div”,{},
…Object.keys(s.votes).map(name=>el(“div”,{className:“card”,style:{display:“flex”,alignItems:“center”,gap:“14px”}},
el(“div”,{style:{fontSize:“18px”}},“🎵”),
el(“div”,{style:{flex:1,fontSize:“13px”,fontWeight:“bold”}},name+(name===s.myName?” (나)”:””)),
el(“div”,{style:{fontSize:“9px”,padding:“3px 8px”,borderRadius:“10px”,background:”#4ade8011”,color:”#4ade80”,border:“1px solid #4ade8033”}},“투표완료”)
)),
el(“div”,{className:“card”,style:{marginTop:“8px”}},
el(“span”,{className:“label”},“초대 링크”),
el(“div”,{style:{background:”#1a1a1a”,borderRadius:“10px”,padding:“12px”,fontSize:“10px”,color:”#555”,marginBottom:“12px”,wordBreak:“break-all”}},invLink),
el(“button”,{className:“btn”,style:{marginTop:“0”,background:s.inviteCopied?”#4ade8022”:”#7c6af7”,color:s.inviteCopied?”#4ade80”:”#fff”},
onClick:()=>{navigator.clipboard?.writeText(invLink);set({inviteCopied:true});setTimeout(()=>set({inviteCopied:false}),2000);}},
s.inviteCopied?“✓ 복사됨!”:“링크 복사 — 멤버에게 공유”)
)
);
}

return el(“div”,{},header,tabs,content,
el(“div”,{style:{marginTop:“48px”,textAlign:“center”,color:”#1e1e1e”,fontSize:“10px”,letterSpacing:”.2em”}},“합간 · MRDW 무릉도원”)
);
}

function render(){
const root=document.getElementById(“root”);
root.innerHTML=””;
const s=state;
let content;
if(s.screen===“landing”) content=renderLanding();
else if(s.screen===“setup”) content=renderSetup();
else if(s.screen===“login”) content=renderLogin();
else if(s.screen===“app”) content=renderApp();
else content=el(“div”,{},el(“div”,{className:“spinner”}));
root.appendChild(content);
}

render();

// 자동 갱신
setInterval(()=>{ if(state.screen===“app”&&state.roomId) loadRoom(state.roomId); },15000);
</script>

</body>
</html>
