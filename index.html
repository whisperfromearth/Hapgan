async function sb(path, o={}) {
  const h = {"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json","Accept":"application/json"};
  if(o.method) h["Prefer"] = o.prefer||"return=representation";
  const r = await fetch(SB_URL+"/rest/v1/"+path,{method:o.method||"GET",headers:h,body:o.body});
  if(!r.ok) throw new Error(await r.text());
  const t=await r.text(); return t?JSON.parse(t):null;
}

function pad(n){return String(n).padStart(2,"0")}

function fmtDate(y,m,d){return (m+1)+"월 "+d+"일 ("+DAYS[new Date(y,m,d).getDay()]+")"}
function fmtTime(t){
  if(!t) return "시간 미정";
  const em=t.h*60+parseInt(t.m)+t.dur*60;
  return pad(t.h)+":"+t.m+" → "+pad(Math.floor(em/60)%24)+":"+pad(em%60)+" ("+t.dur+"시간)";
}

// ── Supabase
async function loadRoom(rid){
  set({loading:true,error:null});
  try{
    const [room,ds,vs]=await Promise.all([
      sb("rooms?id=eq."+rid+"&select=*"),
      sb("dates?room_id=eq."+rid+"&select=*&order=id"),
      sb("votes?room_id=eq."+rid+"&select=*"),
    ]);
    if(!room||!room.length){set({loading:false,error:"방을 찾을 수 없어 😢"});return;}
    const vm={};
    for(const v of vs){if(!vm[v.member_name])vm[v.member_name]={};vm[v.member_name][v.date_id]=v.status;}
    set({loading:false,roomInfo:room[0],dates:ds.map(d=>({id:d.id,date:d.date,time:d.time})),votes:vm});
  }catch(e){set({loading:false,error:"로드 실패: "+e.message});}
}

async function createRoom(){
  set({loading:true,error:null});
  try{
    const id=genId();
    await sb("rooms",{method:"POST",body:JSON.stringify({id,band_name:S.bandName,session_title:S.sessionTitle})});
    for(const d of [...S.selDates].sort((a,b)=>new Date(a.y,a.m,a.d)-new Date(b.y,b.m,b.d))){
      await sb("dates",{method:"POST",body:JSON.stringify({room_id:id,date:fmtDate(d.y,d.m,d.d),time:fmtTime(S.dtMap[dkey(d)])})});
    }
    location.hash=id;
    await loadRoom(id);
    set({screen:"login",roomId:id});
  }catch(e){set({loading:false,error:"방 만들기 실패: "+e.message});}
}

function toggleDate(d){

    set({selDates:S.selDates.filter(s=>!(s.y===d.y&&s.m===d.m&&s.d===d.d)),dtMap:dm});
  }else{
    set({selDates:[...S.selDates,d],timeModal:d,tH:14,tM:"00",tDur:2});
  }
}

// ── DOM 헬퍼
function div(attrs,children){return el("div",attrs,children)}
function el(tag,attrs,children){
  const e=document.createElement(tag);
  for(const [k,v] of Object.entries(attrs||{})){
    if(k==="class") e.className=v;
    else if(k==="style") Object.assign(e.style,v);
    else if(k[0]==="o"&&k[1]==="n") e.addEventListener(k.slice(2),v);
    else e[k]=v;
  }
  if(children){
    const arr=Array.isArray(children)?children:[children];
    for(const c of arr.flat(9)){
      if(c==null||c===false||c===undefined) continue;
      e.appendChild(typeof c==="object"?c:document.createTextNode(String(c)));
    }
  }
  return e;
}

// ── 휠 피커 (DOM 직접)
function makeWheel(items,selected,onSelect,width){
  const IH=40;
  const wrap=div({class:"wheel-wrap",style:{width:(width||72)+"px",height:(IH*5)+"px"}});
  const hl=div({style:{position:"absolute",top:(IH*2)+"px",left:"0",right:"0",height:IH+"px",background:"#7c6af722",borderTop:"1px solid #7c6af755",borderBottom:"1px solid #7c6af755",pointerEvents:"none",zIndex:"2",borderRadius:"8px"}});
  const ft=div({style:{position:"absolute",top:"0",left:"0",right:"0",height:(IH*2)+"px",background:"linear-gradient(to bottom,#111,transparent)",pointerEvents:"none",zIndex:"3"}});
  const fb=div({style:{position:"absolute",bottom:"0",left:"0",right:"0",height:(IH*2)+"px",background:"linear-gradient(to top,#111,transparent)",pointerEvents:"none",zIndex:"3"}});
  const scroll=div({class:"wheel-scroll",style:{height:"100%"}});
  scroll.appendChild(div({style:{height:IH+"px"}}));
  scroll.appendChild(div({style:{height:IH+"px"}}));
  items.forEach((item,i)=>{
    const it=div({class:"wheel-item"+(item===selected?" on":""),style:{height:IH+"px"}},String(item));
    it.addEventListener("click",()=>{onSelect(item);scroll.scrollTop=i*IH;});
    scroll.appendChild(it);
  });
  scroll.appendChild(div({style:{height:IH+"px"}}));
  scroll.appendChild(div({style:{height:IH+"px"}}));
  scroll.addEventListener("scroll",()=>{
    const i=Math.max(0,Math.min(items.length-1,Math.round(scroll.scrollTop/IH)));
    if(items[i]!==selected){selected=items[i];onSelect(items[i]);}
    scroll.querySelectorAll(".wheel-item").forEach((it,j)=>{
      it.className="wheel-item"+(items[j]===selected?" on":"");
    });
  });
  setTimeout(()=>{scroll.scrollTop=items.indexOf(selected)*IH;},0);
  wrap.append(hl,ft,fb,scroll);
  return wrap;
}

// ── 시간 모달
function makeTimeModal(d){
  let h=S.tH,m=S.tM,dur=S.tDur;
  function previewStr(){
    const em=h*60+parseInt(m)+dur*60;
    return pad(h)+":"+m+" → "+pad(Math.floor(em/60)%24)+":"+pad(em%60);
  }
  const preview=div({style:{background:"#1a1a1a",borderRadius:"10px",padding:"12px 16px",textAlign:"center",marginBottom:"20px"}});
  function updatePreview(){
    preview.innerHTML="";
    preview.appendChild(div({style:{fontSize:"11px",color:"#555",marginBottom:"4px"}},"합주 시간"));
    preview.appendChild(div({style:{fontSize:"18px",fontWeight:"bold",color:"#e8e8e8",letterSpacing:".05em"}},previewStr()+" ("+dur+"시간)"));
  }
  updatePreview();

  const hourWheel=makeWheel(HOURS,h,(v)=>{h=v;updatePreview();},72);
  const minWheel=makeWheel(MINS,m,(v)=>{m=v;updatePreview();},72);

  const durRow=div({class:"dur-row"});
  DURS.forEach(dv=>{
    const b=el("button",{class:"dur-btn"+(dur===dv?" on":""),onclick:()=>{
      dur=dv;
      durRow.querySelectorAll(".dur-btn").forEach((bb,i)=>bb.className="dur-btn"+(DURS[i]===dv?" on":""));
      updatePreview();
    }},dv+"시간");
    durRow.appendChild(b);
  });

  const modal=div({class:"modal"},[
    div({style:{fontSize:"11px",color:"#555",marginBottom:"4px"}},fmtDate(d.y,d.m,d.d)),
    div({style:{fontSize:"16px",fontWeight:"bold",marginBottom:"20px"}},"시간 설정"),
    div({style:{fontSize:"10px",color:"#555",letterSpacing:".2em",marginBottom:"10px"}},"시작 시간"),
    div({style:{display:"flex",justifyContent:"center",alignItems:"center",gap:"8px",marginBottom:"20px"}},[hourWheel,div({style:{fontSize:"20px",color:"#333"}},":"),minWheel]),
    div({style:{fontSize:"10px",color:"#555",letterSpacing:".2em",marginBottom:"10px"}},"합주 시간"),
    durRow,preview,
    btn("확인",()=>{
      const dm={...S.dtMap,[dkey(d)]:{h,m,dur}};
      set({dtMap:dm,timeModal:null,tH:h,tM:m,tDur:dur});
    }),
  ]);
  const bg=div({class:"modal-bg"});
  bg.addEventListener("click",()=>set({timeModal:null}));
  modal.addEventListener("click",e=>e.stopPropagation());
  bg.appendChild(modal);
  return bg;
}

// ── 캘린더
function makeCalendar(){
  let cy=S.calY, cm=S.calM;
  function build(){
    const dim=new Date(cy,cm+1,0).getDate();
    const fd=new Date(cy,cm,1).getDay();
    const cells=[...Array(fd).fill(null),...Array.from({length:dim},(_,i)=>i+1)];
    const wrap=div({});
    wrap.appendChild(div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px"}},[
      el("button",{style:{background:"none",border:"none",color:"#555",cursor:"pointer",fontSize:"20px",padding:"4px 10px"},onclick:()=>{
        if(cm===0){cm=11;cy--;}else cm--;
        set({calY:cy,calM:cm});
      }},"‹"),
      div({style:{fontSize:"14px",fontWeight:"bold"}},cy+"년 "+MONTHS[cm]),
      el("button",{style:{background:"none",border:"none",color:"#555",cursor:"pointer",fontSize:"20px",padding:"4px 10px"},onclick:()=>{
        if(cm===11){cm=0;cy++;}else cm++;
        set({calY:cy,calM:cm});
      }},"›"),
    ]));
    const hdr=div({class:"cal-grid"});
    DAYS.forEach((d,i)=>{
      const c=div({class:"cal-hd",style:{color:i===0?"#f87171":i===6?"#9b8ff7":"#444"}},d);
      hdr.appendChild(c);
    });
    wrap.appendChild(hdr);
    const grid=div({class:"cal-grid"});
    cells.forEach((day,i)=>{
      const dow=i%7;
      const isPast=day&&(()=>{const dt=new Date(cy,cm,day);dt.setHours(0,0,0,0);const t=new Date();t.setHours(0,0,0,0);return dt<t;})();
      const isSel=day&&S.selDates.some(s=>s.y===cy&&s.m===cm&&s.d===day);
      let cls="cal-day";
      if(isSel)cls+=" sel";else if(!day||isPast)cls+=" past";else if(dow===0)cls+=" sun";else if(dow===6)cls+=" sat";
      const b=el("button",{class:cls},day||"");
      if(day&&!isPast) b.addEventListener("click",()=>toggleDate({y:cy,m:cm,d:day}));
      grid.appendChild(b);
    });
    wrap.appendChild(grid);
    return wrap;
  }
  return build();
}

// ── 입력 필드 (한글 안전 버전)
function makeInput(placeholder, initVal, onDone){
  const inp=el("input",{class:"inp",placeholder,value:initVal||""});
  // 한글 IME 안전: compositionend 후에만 state 업데이트
  let composing=false;
  inp.addEventListener("compositionstart",()=>composing=true);
  inp.addEventListener("compositionend",()=>{composing=false;onDone(inp.value);});
  inp.addEventListener("input",()=>{if(!composing)onDone(inp.value);});
  return inp;
}

  if(S.setupStep==="info"){
    const inp1=makeInput("예) MRDW 무릉도원",S.bandName,v=>{ S.bandName=v; });
    const inp2=makeInput("예) 3월 합주",S.sessionTitle,v=>{ S.sessionTitle=v; });
    const nextBtn=btn("다음 — 날짜 선택",()=>{
      S.bandName=inp1.value; S.sessionTitle=inp2.value;
      if(S.bandName.trim()&&S.sessionTitle.trim()) set({setupStep:"calendar"});
    },true);
    return div({},[back,prog,
      div({style:{fontSize:"10px",color:"#7c6af7",letterSpacing:".3em",marginBottom:"8px"}},"STEP 1"),
      el("h2",{style:{fontSize:"22px",fontWeight:"bold",margin:"0 0 4px"}},"밴드 정보"),
      el("p",{style:{color:"#444",fontSize:"12px",marginBottom:"28px"}},"합주방을 만들어보자"),
      el("span",{class:"label"},"밴드 이름"),inp1,
      div({style:{marginBottom:"16px"}}),
      el("span",{class:"label"},"합주 이름"),inp2,
      nextBtn,
    ]);
  }

  // calendar step
  const selList=S.selDates.length?div({style:{marginBottom:"12px"}},[
    el("span",{class:"label"},"선택됨 "+S.selDates.length+"개"),
    ...[...S.selDates].sort((a,b)=>new Date(a.y,a.m,a.d)-new Date(b.y,b.m,b.d)).map(d=>{
      const t=S.dtMap[dkey(d)];
      return div({style:{display:"flex",alignItems:"center",gap:"8px",background:"#1a1a1a",border:"1px solid "+(t?"#7c6af733":"#f8717133"),borderRadius:"10px",padding:"10px 14px",marginBottom:"6px"}},[
        div({style:{flex:"1"}},[
          div({style:{fontSize:"12px",color:"#aaa"}},fmtDate(d.y,d.m,d.d)),
          div({style:{fontSize:"11px",color:t?"#7c6af7":"#f87171",marginTop:"2px"}},t?fmtTime(t):"⚠ 시간 미설정 — 탭해서 설정"),
        ]),
        el("button",{style:{background:"none",border:"1px solid #2a2a2a",borderRadius:"6px",color:"#555",cursor:"pointer",fontSize:"10px",padding:"4px 8px"},onclick:()=>set({timeModal:d,tH:t?t.h:14,tM:t?t.m:"00",tDur:t?t.dur:2})},"수정"),
        el("button",{style:{background:"none",border:"none",color:"#444",cursor:"pointer",fontSize:"16px",padding:"0"},onclick:()=>toggleDate(d)},"×"),
      ]);
    }),
  ]):null;

  const allReady=S.selDates.length>0&&S.selDates.every(d=>S.dtMap[dkey(d)]);
  const createBtn=btn(S.loading?"만드는 중...":"완료 — 합주방 만들기 🎸",()=>{if(allReady&&!S.loading)createRoom();},allReady&&!S.loading);
  const errEl=S.error?div({class:"err"},S.error):null;

  return div({},[back,prog,
    div({style:{fontSize:"10px",color:"#7c6af7",letterSpacing:".3em",marginBottom:"8px"}},"STEP 2"),
    el("h2",{style:{fontSize:"22px",fontWeight:"bold",margin:"0 0 4px"}},"날짜 + 시간 선택"),
    el("p",{style:{color:"#444",fontSize:"12px",marginBottom:"20px"}},"날짜 누르면 시간도 바로 설정돼"),
    div({class:"card"},makeCalendar()),
    selList,errEl,createBtn,
  ]);
}

function renderLogin(){
  if(S.loading) return div({style:{textAlign:"center"}},el("div",{class:"spinner"}));
  const back=backBtn(()=>{set({screen:"landing"});location.hash="";});

  if(S.loginStep==="name"){
    const inp=makeInput("예) 이지구",S.myName,v=>{ S.myName=v; });
    const nextBtn=btn("다음",()=>{S.myName=inp.value.trim();if(S.myName)set({loginStep:"role"});},true);
    return div({},[back,logo(),
      S.roomInfo?div({style:{fontSize:"11px",color:"#555",margin:"8px 0 20px"}},S.roomInfo.band_name+" · "+S.roomInfo.session_title):null,
      el("h2",{style:{fontSize:"22px",fontWeight:"bold",margin:"16px 0 4px"}},"이름을 알려줘"),
      el("p",{style:{color:"#444",fontSize:"12px",marginBottom:"28px"}},"합주 일정에 참여하려면 이름이 필요해"),
      el("span",{class:"label"},"이름"),inp,nextBtn,
    ]);
  }

  return div({},[back,logo(),
    el("h2",{style:{fontSize:"22px",fontWeight:"bold",margin:"16px 0 4px"}},"포지션은?"),
    el("p",{style:{color:"#444",fontSize:"12px",marginBottom:"28px"}},"밴드에서 어떤 파트야?"),
    div({class:"role-grid"},ROLES.map(r=>el("button",{class:"role-btn"+(S.myRole===r?" on":""),onclick:()=>set({myRole:r})},EMO[r]+" "+r))),
    btn("참여하기",async()=>{if(S.myRole){await loadRoom(S.roomId);set({screen:"app"});}},!!S.myRole),
  ]);
}

function renderApp(){
  const best=S.dates.length?S.dates.reduce((b,d)=>scoreFor(d.id)>=scoreFor(b.id)?d:b):null;
  const invLink=S.roomId?location.origin+location.pathname+"#"+S.roomId:"";
  const voterNames=Object.keys(S.votes);

  const header=div({style:{marginBottom:"24px"}},[
    div({style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}},[
      div({},[
        logo(),
        el("h1",{style:{fontSize:"20px",fontWeight:"bold",margin:"0",lineHeight:"1.2"}},[
          (S.roomInfo?.band_name||S.bandName),
          el("br"),
          el("span",{style:{color:"#7c6af7"}},S.roomInfo?.session_title||S.sessionTitle),
        ]),
      ]),
      el("button",{style:{background:"none",border:"1px solid #2a2a2a",borderRadius:"8px",padding:"6px 10px",color:"#555",cursor:"pointer",fontSize:"11px"},onclick:()=>loadRoom(S.roomId)},"↻"),
    ]),
    el("p",{style:{color:"#333",fontSize:"11px",marginTop:"6px"}},[
      "방 코드: ",el("span",{style:{color:"#7c6af7",letterSpacing:".1em"}},S.roomId)," · 날짜 "+S.dates.length+"개",
    ]),
  ]);

  const tabs=div({class:"tabs"},["vote","result","members"].map(t=>
    el("button",{class:"tab"+(S.view===t?" on":""),onclick:()=>set({view:t})},t==="vote"?"내 일정":t==="result"?"현황":"멤버")
  ));

  let content;
  if(S.view==="vote"){
    if(S.submitted){
      content=div({style:{textAlign:"center",paddingTop:"40px"}},[
        div({style:{fontSize:"32px",marginBottom:"12px"}},"✅"),
        div({style:{fontSize:"16px",fontWeight:"bold",marginBottom:"8px"}},"투표 완료!"),
        div({style:{fontSize:"12px",color:"#555",marginBottom:"24px"}},"현황 탭에서 결과 확인해봐"),
        btn("다시 수정하기",()=>set({submitted:false})),
      ]);
    }else{
      content=div({},[
        el("p",{style:{fontSize:"11px",color:"#444",marginBottom:"16px"}},S.myName+"님, 각 날짜 가능 여부를 선택해줘"),
        ...S.dates.map(d=>div({class:"card",style:{borderColor:S.myVotes[d.id]==="ok"?"#4ade8033":S.myVotes[d.id]==="maybe"?"#facc1533":"#1e1e1e"}},[
          div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}},[
            div({},[
              div({style:{fontSize:"14px",fontWeight:"bold"}},d.date),
              div({style:{fontSize:"11px",color:"#444",marginTop:"2px"}},d.time),
            ]),
            div({style:{fontSize:"10px",padding:"3px 8px",borderRadius:"20px",background:"#1a1a1a",color:"#555"}},scoreFor(d.id)+"명 가능"),
          ]),
          div({class:"status-row"},["ok","maybe","no"].map(sv=>{
            const b=el("button",{class:"status-btn",onclick:()=>set({myVotes:{...S.myVotes,[d.id]:sv}})},SL[sv]);
            if(S.myVotes[d.id]===sv){b.style.borderColor=SC[sv];b.style.background=SC[sv]+"22";b.style.color=SC[sv];}
            return b;
          })),
        ])),
        S.error?div({class:"err"},S.error):null,
        btn(S.loading?"제출 중...":"제출하기",()=>{if(!S.loading&&S.dates.every(d=>S.myVotes[d.id]))submitVote();},S.dates.every(d=>S.myVotes[d.id])&&!S.loading),
      ]);
    }
  }else if(S.view==="result"){
    content=div({},[
      best?div({style:{background:"linear-gradient(135deg,#7c6af722,#4ade8011)",border:"1px solid #7c6af733",borderRadius:"14px",padding:"18px 20px",marginBottom:"20px"}},[
        div({style:{fontSize:"10px",color:"#7c6af7",letterSpacing:".3em",marginBottom:"6px"}},"BEST DATE"),
        div({style:{fontSize:"18px",fontWeight:"bold"}},best.date),
        div({style:{fontSize:"12px",color:"#666",marginTop:"2px"}},best.time+" · "+scoreFor(best.id)+"명 가능"),
        !S.confirmed
          ?el("button",{style:{marginTop:"14px",padding:"8px 20px",background:"#7c6af7",border:"none",borderRadius:"8px",color:"#fff",fontSize:"11px",cursor:"pointer",fontFamily:"'Courier New',monospace"},onclick:()=>set({confirmed:best})},"이 날로 확정 ✓")
          :div({style:{marginTop:"12px",fontSize:"12px",color:"#4ade80"}},"✓ "+S.confirmed.date+" 합주 확정!"),
      ]):null,
      ...S.dates.map(d=>div({class:"card"},[
        div({style:{display:"flex",justifyContent:"space-between",marginBottom:"12px"}},[
          div({},[el("span",{style:{fontSize:"13px",fontWeight:"bold"}},d.date),el("span",{style:{fontSize:"11px",color:"#444",marginLeft:"8px"}},d.time)]),
          div({style:{fontSize:"12px",color:"#555"}},scoreFor(d.id)+"/"+voterNames.length+"명"),
        ]),
        div({style:{display:"flex",flexDirection:"column",gap:"7px"}},
          voterNames.length===0
            ?[div({style:{fontSize:"11px",color:"#333"}},"아직 투표한 멤버가 없어")]
            :voterNames.map(name=>{
                const v=S.votes[name]?.[d.id];
                return div({style:{display:"flex",alignItems:"center",gap:"10px"}},[
                  el("span",{style:{fontSize:"12px",flex:"1",color:"#aaa"}},name+(name===S.myName?" (나)":"")),
                  el("span",{style:{fontSize:"10px",padding:"2px 8px",borderRadius:"10px",background:v?SC[v]+"22":"#1a1a1a",color:v?SC[v]:"#333"}},v?SL[v]:"미응답"),
                ]);
              })
        ),
      ])),
    ]);
  }else{
    content=div({},[
      voterNames.length===0?div({style:{fontSize:"12px",color:"#333",marginBottom:"20px"}},"아직 투표한 멤버가 없어. 링크를 공유해봐!"):null,
      ...voterNames.map(name=>div({class:"card",style:{display:"flex",alignItems:"center",gap:"14px",borderColor:name===S.myName?"#7c6af733":"#1e1e1e"}},[
        div({style:{width:"40px",height:"40px",borderRadius:"50%",background:name===S.myName?"#7c6af722":"#1a1a1a",border:"1px solid "+(name===S.myName?"#7c6af7":"#2a2a2a"),display:"flex",alignItems:"center",justifyContent:"center",fontSize:"18px"}},"🎵"),
        div({style:{flex:"1",fontSize:"13px",fontWeight:"bold"}},name+(name===S.myName?" (나)":"")),
        div({style:{fontSize:"9px",padding:"3px 8px",borderRadius:"10px",background:"#4ade8011",color:"#4ade80",border:"1px solid #4ade8033"}},"투표완료"),
      ])),
      div({class:"card",style:{marginTop:"8px"}},[
        el("span",{class:"label"},"초대 링크 공유"),
        div({style:{background:"#1a1a1a",borderRadius:"10px",padding:"12px 14px",fontSize:"10px",color:"#555",marginBottom:"12px",wordBreak:"break-all",lineHeight:"1.6"}},invLink),
        btn(S.inviteCopied?"✓ 복사됨!":"링크 복사 — 멤버에게 공유",()=>{
          navigator.clipboard?.writeText(invLink);
          set({inviteCopied:true});
          setTimeout(()=>set({inviteCopied:false}),2000);
        }),
      ]),
    ]);
  }

  return div({},[header,tabs,content,
    div({style:{marginTop:"48px",textAlign:"center",color:"#1e1e1e",fontSize:"10px",letterSpacing:".2em"}},"합간 · MRDW 무릉도원"),
  ]);
}

render();
setInterval(()=>{if(S.screen==="app"&&S.roomId)loadRoom(S.roomId);},15000);
</script>
</body>
</html>
