async function sb(path, opts = {}) {
const { method=“GET”, body, prefer } = opts;
const headers = {
“apikey”: SUPABASE_KEY,
“Authorization”: `Bearer ${SUPABASE_KEY}`,
“Content-Type”: “application/json”,
“Accept”: “application/json”,
};
if (prefer || method !== “GET”) {
headers[“Prefer”] = prefer || “return=representation”;
}
const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
method, headers,
…(body ? { body } : {}),
});
if (!res.ok) {
const err = await res.text();
throw new Error(`${res.status}: ${err}`);
}
const text = await res.text();
return text ? JSON.parse(text) : null;
}

function WheelPicker({ items, selected, onSelect, width=80 }) {
const ITEM_H = 40;
const ref = useRef(null);
const idx = items.indexOf(selected);

useEffect(() => {
if (ref.current) ref.current.scrollTop = idx * ITEM_H;
}, []);

const handleScroll = useCallback(() => {
if (!ref.current) return;
const i = Math.round(ref.current.scrollTop / ITEM_H);
const c = Math.max(0, Math.min(items.length-1, i));
if (items[c] !== selected) onSelect(items[c]);
}, [items, selected, onSelect]);

return (
<div style={{ position:“relative”, width, height:ITEM_H*5, overflow:“hidden” }}>
<div style={{ position:“absolute”, top:ITEM_H*2, left:0, right:0, height:ITEM_H, background:”#7c6af722”, borderTop:“1px solid #7c6af755”, borderBottom:“1px solid #7c6af755”, pointerEvents:“none”, zIndex:2, borderRadius:8 }}/>
<div style={{ position:“absolute”, top:0, left:0, right:0, height:ITEM_H*2, background:“linear-gradient(to bottom, #111, transparent)”, pointerEvents:“none”, zIndex:3 }}/>
<div style={{ position:“absolute”, bottom:0, left:0, right:0, height:ITEM_H*2, background:“linear-gradient(to top, #111, transparent)”, pointerEvents:“none”, zIndex:3 }}/>
<div ref={ref} onScroll={handleScroll} style={{ height:“100%”, overflowY:“scroll”, scrollSnapType:“y mandatory”, scrollbarWidth:“none” }}>
<style>{`div::-webkit-scrollbar{display:none}`}</style>
{[…Array(2)].map((*,i)=><div key={`a${i}`} style={{height:ITEM_H}}/>)}
{items.map((item,i)=>(
<div key={String(item)} onClick={()=>{ onSelect(item); ref.current.scrollTop=i*ITEM_H; }} style={{ height:ITEM_H, display:“flex”, alignItems:“center”, justifyContent:“center”, scrollSnapAlign:“start”, cursor:“pointer”, fontSize:15, fontFamily:”‘Courier New’, monospace”, color:item===selected?”#e8e8e8”:”#444”, fontWeight:item===selected?“bold”:“normal” }}>
{item}
</div>
))}
{[…Array(2)].map((*,i)=><div key={`b${i}`} style={{height:ITEM_H}}/>)}
</div>
</div>
);
}

function Calendar({ selectedDates, onToggle }) {
const today = new Date();
const [calYear, setCalYear] = useState(today.getFullYear());
const [calMonth, setCalMonth] = useState(today.getMonth());
const daysInMonth = getDaysInMonth(calYear, calMonth);
const firstDay = getFirstDay(calYear, calMonth);
const cells = […Array(firstDay).fill(null), …Array.from({length:daysInMonth},(_,i)=>i+1)];
const isSelected = day => day && selectedDates.some(d=>d.year===calYear&&d.month===calMonth&&d.day===day);
const isPast = day => {
if (!day) return false;
const d = new Date(calYear,calMonth,day); d.setHours(0,0,0,0);
const t = new Date(); t.setHours(0,0,0,0);
return d < t;
};
return (
<div>
<div style={{ display:“flex”, justifyContent:“space-between”, alignItems:“center”, marginBottom:16 }}>
<button onClick={()=>{ if(calMonth===0){setCalMonth(11);setCalYear(y=>y-1);}else setCalMonth(m=>m-1); }} style={{ background:“none”, border:“none”, color:”#555”, cursor:“pointer”, fontSize:20, padding:“4px 10px” }}>‹</button>
<span style={{ fontSize:14, fontWeight:“bold” }}>{calYear}년 {MONTHS[calMonth]}</span>
<button onClick={()=>{ if(calMonth===11){setCalMonth(0);setCalYear(y=>y+1);}else setCalMonth(m=>m+1); }} style={{ background:“none”, border:“none”, color:”#555”, cursor:“pointer”, fontSize:20, padding:“4px 10px” }}>›</button>
</div>
<div style={{ display:“grid”, gridTemplateColumns:“repeat(7,1fr)”, gap:2, marginBottom:4 }}>
{DAYS.map((d,i)=><div key={d} style={{ textAlign:“center”, fontSize:10, color:i===0?”#f87171”:i===6?”#9b8ff7”:”#444”, padding:“4px 0” }}>{d}</div>)}
</div>
<div style={{ display:“grid”, gridTemplateColumns:“repeat(7,1fr)”, gap:2 }}>
{cells.map((day,i)=>{
const past=isPast(day); const sel=isSelected(day); const dow=i%7;
return <button key={i} onClick={()=>!past&&day&&onToggle({year:calYear,month:calMonth,day})} style={{ aspectRatio:“1”, borderRadius:8, border:“none”, background:sel?”#7c6af7”:“transparent”, color:!day||past?”#222”:sel?”#fff”:dow===0?”#f87171”:dow===6?”#9b8ff7”:”#e8e8e8”, cursor:!day||past?“default”:“pointer”, fontSize:12, fontFamily:”‘Courier New’, monospace”, fontWeight:sel?“bold”:“normal” }}>{day||””}</button>;
})}
</div>
</div>
);
}
