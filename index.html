<!DOCTYPE html>

<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>잼잼 — 뮤지션을 위한 합주 플랫폼</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root{--indigo:#4F46E5;--indigo-light:#6366F1;--indigo-dim:#4F46E520;--mint:#2DD4BF;--mint-dim:#2DD4BF20;--amber:#F59E0B;--amber-dim:#F59E0B20;--danger:#EF4444;--danger-dim:#EF444420;--bg:#0F172A;--surface:#1E293B;--surface2:#263347;--border:#334155;--border-light:#2a3a50;--text:#F1F5F9;--text2:#94A3B8;--text3:#475569}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}
    .bg-mesh{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
    .bg-mesh::before{content:'';position:absolute;width:600px;height:600px;background:radial-gradient(circle,#4F46E530 0%,transparent 70%);top:-200px;left:-100px;animation:drift1 20s ease-in-out infinite alternate}
    .bg-mesh::after{content:'';position:absolute;width:400px;height:400px;background:radial-gradient(circle,#2DD4BF18 0%,transparent 70%);bottom:-100px;right:-100px;animation:drift2 15s ease-in-out infinite alternate}
    @keyframes drift1{to{transform:translate(60px,40px)}}
    @keyframes drift2{to{transform:translate(-40px,-30px)}}
    .wrap{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:0 0 80px;min-height:100vh}
    input,button,textarea{font-family:'Noto Sans KR',sans-serif}
    textarea{resize:vertical}
    .inp{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:14px 16px;color:var(--text);font-size:15px;outline:none;box-sizing:border-box;transition:border-color .2s}
    .inp::placeholder{color:var(--text3)}
    .inp:focus{border-color:var(--indigo-light)}
    .textarea{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:14px 16px;color:var(--text);font-size:15px;outline:none;box-sizing:border-box;resize:vertical;min-height:90px;line-height:1.7;transition:border-color .2s}
    .textarea:focus{border-color:var(--indigo-light)}
    .textarea::placeholder{color:var(--text3)}
    .btn{width:100%;padding:15px 20px;margin-top:10px;background:var(--indigo);border:none;border-radius:12px;cursor:pointer;color:#fff;font-size:15px;font-weight:600;font-family:'Noto Sans KR',sans-serif;transition:all .2s}
    .btn:hover:not(.off){filter:brightness(1.1);transform:translateY(-1px)}
    .btn.off{background:var(--surface);border:1.5px solid var(--border);color:var(--text3);cursor:default;pointer-events:none}
    .btn.secondary{background:transparent;border:1.5px solid var(--border);color:var(--text2)}
    .btn.danger{background:var(--danger-dim);border:1px solid var(--danger);color:var(--danger)}
    .btn.mint{background:var(--mint);color:#0F172A;font-weight:700}
    .btn.sm{padding:9px 16px;font-size:13px;width:auto;margin-top:0;border-radius:9px}
    .card{background:var(--surface);border:1px solid var(--border-light);border-radius:16px;padding:18px 20px;margin-bottom:12px;box-shadow:0 4px 20px rgba(0,0,0,.4)}
    .card-hover{transition:border-color .2s,transform .15s;cursor:pointer}
    .card-hover:hover{border-color:var(--indigo-light);transform:translateY(-2px)}
    .label{font-size:12px;color:var(--text2);font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;display:block}
    .tabs{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;padding:0 20px}
    .tabs::-webkit-scrollbar{display:none}
    .tab{background:none;border:none;border-bottom:2.5px solid transparent;cursor:pointer;padding:12px 14px 14px;font-size:13px;font-weight:600;color:var(--text3);font-family:'Noto Sans KR',sans-serif;white-space:nowrap;transition:color .2s}
    .tab.on{color:var(--indigo-light);border-bottom-color:var(--indigo-light)}
    .role-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
    .role-btn{padding:13px 0;border-radius:12px;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-size:13px;font-weight:500;font-family:'Noto Sans KR',sans-serif;transition:all .15s}
    .role-btn.on{border-color:var(--indigo);background:var(--indigo-dim);color:var(--indigo-light);font-weight:700}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
    .cal-hd{text-align:center;font-size:11px;padding:5px 0;font-weight:600;color:var(--text3)}
    .cal-day{aspect-ratio:1;border-radius:9px;border:none;background:transparent;color:var(--text);cursor:pointer;font-size:13px;font-weight:500;font-family:'Noto Sans KR',sans-serif;transition:all .15s}
    .cal-day.sel{background:var(--indigo);color:#fff;font-weight:700}
    .cal-day.past{color:var(--text3);cursor:default}
    .cal-day.sun{color:#f87171}
    .cal-day.sat{color:var(--indigo-light)}
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end;backdrop-filter:blur(4px)}
    .modal{background:var(--surface);border-radius:24px 24px 0 0;padding:28px 24px 52px;width:100%;max-width:480px;margin:0 auto;border-top:1px solid var(--border);max-height:92vh;overflow-y:auto}
    .modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 24px;display:block}
    .wheel-wrap{position:relative;overflow:hidden}
    .wheel-scroll{height:100%;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none}
    .wheel-scroll::-webkit-scrollbar{display:none}
    .wheel-item{display:flex;align-items:center;justify-content:center;scroll-snap-align:start;cursor:pointer;font-size:16px;color:var(--text3);font-weight:500}
    .wheel-item.on{color:var(--text);font-weight:700}
    .dur-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px}
    .dur-btn{padding:8px 14px;border-radius:9px;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-size:13px;font-weight:500;font-family:'Noto Sans KR',sans-serif;transition:all .15s}
    .dur-btn.on{border-color:var(--indigo);background:var(--indigo-dim);color:var(--indigo-light)}
    .status-row{display:flex;gap:8px;margin-top:12px}
    .status-btn{flex:1;padding:10px 0;border-radius:10px;border:1.5px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-size:13px;font-weight:600;font-family:'Noto Sans KR',sans-serif;transition:all .15s}
    .badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;display:inline-block}
    .badge-indigo{background:var(--indigo-dim);color:var(--indigo-light);border:1px solid #4F46E540}
    .badge-mint{background:var(--mint-dim);color:var(--mint);border:1px solid #2DD4BF40}
    .badge-amber{background:var(--amber-dim);color:var(--amber);border:1px solid #F59E0B40}
    .badge-danger{background:var(--danger-dim);color:var(--danger);border:1px solid #EF444440}
    .badge-gray{background:#334155;color:var(--text2)}
    .err{font-size:13px;color:var(--danger);margin:8px 0;padding:10px 14px;background:var(--danger-dim);border-radius:9px}
    .icon-btn{background:none;border:1.5px solid var(--border);border-radius:9px;padding:7px 12px;color:var(--text2);cursor:pointer;font-size:12px;font-weight:600;font-family:'Noto Sans KR',sans-serif;transition:all .15s}
    .icon-btn:hover{border-color:var(--indigo-light);color:var(--text)}
    .tag{display:inline-block;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;margin:3px 3px 3px 0;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);font-family:'Noto Sans KR',sans-serif;transition:all .15s}
    .tag.on{border-color:var(--indigo);background:var(--indigo-dim);color:var(--indigo-light)}
    .room-card{background:var(--surface);border:1px solid var(--border-light);border-radius:16px;padding:16px 18px;margin-bottom:10px;cursor:pointer;transition:all .2s;box-shadow:0 2px 12px rgba(0,0,0,.3)}
    .room-card:hover{border-color:var(--indigo-light);transform:translateY(-2px)}
    .prog{display:flex;gap:6px;margin-bottom:28px}
    .prog-bar{flex:1;height:3px;border-radius:2px;background:var(--border);transition:background .3s}
    .prog-bar.on{background:var(--indigo)}
    .page-header{padding:20px 20px 0;margin-bottom:24px}
    .page-content{padding:0 20px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .spinner{width:36px;height:36px;border:2.5px solid var(--border);border-top-color:var(--indigo);border-radius:50%;animation:spin .8s linear infinite;margin:100px auto}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .fade-up{animation:fadeUp .35s ease forwards}
  </style>
</head>

<script>
const SB_URL="https://tjjhkddtfyoyshgtlvsl.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRqamhrZGR0ZnlveXNoZ3RsdnNsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyODgxNzUsImV4cCI6MjA4ODg2NDE3NX0.ivy7wL_0xBqGynZZrS4MrIkPMQT15pPGMrnu0OJUb9Q";
async function sb(path,o={}){
  const h={"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json","Accept":"application/json"};
  if(o.method&&o.method!=="GET")h["Prefer"]=o.prefer||"return=representation";
  const r=await fetch(SB_URL+"/rest/v1/"+path,{method:o.method||"GET",headers:h,body:o.body});
  if(!r.ok)throw new Error(await r.text());
  const t=await r.text();return t?JSON.parse(t):null;
}
const ROLES=["보컬","기타","베이스","드럼","키보드","세션","기타(other)"];
const EMO={"보컬":"🎤","기타":"🎸","베이스":"🎵","드럼":"🥁","키보드":"🎹","세션":"🎙️","기타(other)":"🎶"};
const DAYS=["일","월","화","수","목","금","토"];
const MONTHS=["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];
const HOURS=Array.from({length:16},(_,i)=>i+8);
const MINS=["00","15","30","45"];
const DURS=[1,1.5,2,2.5,3,3.5,4];
const SC={"ok":"#2DD4BF","maybe":"#F59E0B","no":"#EF4444"};
const SL={"ok":"됨 ✓","maybe":"애매","no":"안됨"};
const SETLIST_TAGS=["자작곡","커버","신곡 연습","합 맞추기","녹음","공연 준비"];
function pad(n){return String(n).padStart(2,"0")}
function dkey(d){return d.y+"-"+d.m+"-"+d.d}
function fmtDate(y,m,d){return (m+1)+"월 "+d+"일 ("+DAYS[new Date(y,m,d).getDay()]+")"}
function fmtTime(t){
  if(!t)return "시간 미정";
  const em=t.h*60+parseInt(t.m)+t.dur*60;
  return pad(t.h)+":"+t.m+" → "+pad(Math.floor(em/60)%24)+":"+pad(em%60)+" ("+t.dur+"시간)";
}
function genId(){return Math.random().toString(36).slice(2,8).toUpperCase()}
function isHost(){return S.roomInfo&&S.myName&&S.roomInfo.host_name===S.myName}
let S={
  screen:"landing",loading:false,error:null,myRooms:[],
  bandName:"",sessionTitle:"",location:"",locationUrl:"",
  setupStep:"info",selDates:[],dtMap:{},timeModal:null,
  tH:14,tM:"00",tDur:2,calY:new Date().getFullYear(),calM:new Date().getMonth(),
  roomId:null,roomInfo:null,loginStep:"name",myName:"",myRole:"",
  dates:[],votes:{},myVotes:{},confirmed:null,
  view:"vote",submitted:false,inviteCopied:false,
  journals:[],journalModal:null,journalSetlist:"",journalMemo:"",journalTags:[],journalCost:"",journalMembers:"",journalSaving:false,
  settleModal:false,settleCost:"",settleCount:"",
};
function lsGet(k){try{return JSON.parse(localStorage.getItem(k))||null}catch{return null}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
const sn=lsGet("jj_name"),sr=lsGet("jj_role");
if(sn)S.myName=sn;if(sr)S.myRole=sr;
S.myRooms=lsGet("jj_rooms")||[];
const hash=location.hash.replace("#","");
if(hash){S.roomId=hash;S.screen="login";}
function set(patch){Object.assign(S,patch);render()}
async function loadRoom(rid){
  set({loading:true,error:null});
  try{
    const [room,ds,vs,js]=await Promise.all([
      sb("rooms?id=eq."+rid+"&select=*"),
      sb("dates?room_id=eq."+rid+"&select=*&order=id"),
      sb("votes?room_id=eq."+rid+"&select=*"),
      sb("journals?room_id=eq."+rid+"&select=*&order=id.desc"),
    ]);
    if(!room||!room.length){set({loading:false,error:"방을 찾을 수 없어 😢"});return;}
    const vm={};
    for(const v of vs){if(!vm[v.member_name])vm[v.member_name]={};vm[v.member_name][v.date_id]=v.status;}
    const conf=room[0].confirmed_date_id?ds.find(d=>d.id===room[0].confirmed_date_id):null;
    set({loading:false,roomInfo:room[0],dates:ds.map(d=>({id:d.id,date:d.date,time:d.time})),votes:vm,journals:js||[],confirmed:conf?{id:conf.id,date:conf.date,time:conf.time}:null});
  }catch(e){set({loading:false,error:"로드 실패: "+e.message});}
}
async function createRoom(){
  set({loading:true,error:null});
  try{
    const id=genId();
    await sb("rooms",{method:"POST",body:JSON.stringify({id,band_name:S.bandName,session_title:S.sessionTitle,host_name:S.myName,location:S.location||null,location_url:S.locationUrl||null})});
    for(const d of [...S.selDates].sort((a,b)=>new Date(a.y,a.m,a.d)-new Date(b.y,b.m,b.d))){
      await sb("dates",{method:"POST",body:JSON.stringify({room_id:id,date:fmtDate(d.y,d.m,d.d),time:fmtTime(S.dtMap[dkey(d)])})});
    }
    const rooms=[...S.myRooms.filter(r=>r.id!==id),{id,band_name:S.bandName,session_title:S.sessionTitle,created:Date.now()}].slice(-10);
    lsSet("jj_rooms",rooms);location.hash=id;
    await loadRoom(id);
    set({screen:"app",roomId:id,myRooms:rooms});
  }catch(e){set({loading:false,error:"방 만들기 실패: "+e.message});}
}
async function submitVote(){
  set({loading:true,error:null});
  try{
    for(const [did,status] of Object.entries(S.myVotes)){
      const ex=await sb("votes?room_id=eq."+S.roomId+"&date_id=eq."+did+"&member_name=eq."+encodeURIComponent(S.myName)+"&select=id");
      if(ex&&ex.length){await sb("votes?id=eq."+ex[0].id,{method:"PATCH",prefer:"return=minimal",body:JSON.stringify({status})});}
      else{await sb("votes",{method:"POST",body:JSON.stringify({room_id:S.roomId,date_id:parseInt(did),member_name:S.myName,member_role:S.myRole,status})});}
    }
    set({loading:false,votes:{...S.votes,[S.myName]:{...S.myVotes}},submitted:true,view:"result"});
  }catch(e){set({loading:false,error:"투표 실패: "+e.message});}
}
async function confirmDate(d){
  try{await sb("rooms?id=eq."+S.roomId,{method:"PATCH",prefer:"return=minimal",body:JSON.stringify({confirmed_date_id:d.id})});set({confirmed:d});}
  catch(e){set({error:"확정 실패: "+e.message});}
}
async function closeVoting(){
  try{await sb("rooms?id=eq."+S.roomId,{method:"PATCH",prefer:"return=minimal",body:JSON.stringify({closed:true})});set({roomInfo:{...S.roomInfo,closed:true}});}
  catch(e){set({error:"마감 실패: "+e.message});}
}
async function saveJournal(){
  set({journalSaving:true});
  try{
    const body={room_id:S.roomId,setlist:S.journalSetlist||null,memo:S.journalMemo||null,tags:S.journalTags.join(","),total_cost:S.journalCost?parseInt(S.journalCost):null,members:S.journalMembers||null};
    if(S.journalModal&&S.journalModal.id){await sb("journals?id=eq."+S.journalModal.id,{method:"PATCH",prefer:"return=minimal",body:JSON.stringify(body)});}
    else{await sb("journals",{method:"POST",body:JSON.stringify(body)});}
    await loadRoom(S.roomId);
    set({journalModal:null,journalSaving:false,journalSetlist:"",journalMemo:"",journalTags:[],journalCost:"",journalMembers:""});
  }catch(e){set({journalSaving:false,error:"저장 실패: "+e.message});}
}
function toggleDate(d){
  const exists=S.selDates.find(s=>s.y===d.y&&s.m===d.m&&s.d===d.d);
  if(exists){const dm={...S.dtMap};delete dm[dkey(d)];set({selDates:S.selDates.filter(s=>!(s.y===d.y&&s.m===d.m&&s.d===d.d)),dtMap:dm});}
  else{set({selDates:[...S.selDates,d],timeModal:d,tH:14,tM:"00",tDur:2});}
}
function scoreFor(did){return Object.values(S.votes).filter(v=>v[did]==="ok").length}
function div(a,c){return el("div",a,c)}
function el(tag,attrs,children){
  const e=document.createElement(tag);
  for(const [k,v] of Object.entries(attrs||{})){
    if(k==="class")e.className=v;
    else if(k==="style")Object.assign(e.style,v);
    else if(k[0]==="o"&&k[1]==="n")e.addEventListener(k.slice(2),v);
    else e.setAttribute(k,v);
  }
  if(children!=null){
    for(const c of (Array.isArray(children)?children:[children]).flat(9)){
      if(c==null||c===false||c===undefined)continue;
      e.appendChild(typeof c==="object"?c:document.createTextNode(String(c)));
    }
  }
  return e;
}
function logo(size){
  const s=size||22;
  return div({style:{display:"flex",alignItems:"center",gap:"6px",marginBottom:"4px"}},[
    div({style:{width:s+"px",height:s+"px",borderRadius:"8px",background:"linear-gradient(135deg,#4F46E5,#2DD4BF)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:(s*.55)+"px"}},"🎸"),
    div({style:{fontSize:s+"px",fontWeight:900,letterSpacing:"-.03em"}},[
      el("span",{style:{color:"#4F46E5"}},"잼"),
      el("span",{style:{color:"#2DD4BF"}},"잼"),
    ]),
  ]);
}
function btn(label,onClick,active,extraClass){
  return el("button",{class:"btn"+(active===false?" off":"")+(extraClass?" "+extraClass:""),onclick:onClick||function(){}},label);
}
function backBtn(onClick){
  return el("button",{style:{background:"none",border:"none",color:"var(--text2)",cursor:"pointer",fontSize:"14px",fontWeight:600,marginBottom:"24px",padding:"0",display:"flex",alignItems:"center",gap:"6px",fontFamily:"'Noto Sans KR',sans-serif"},onclick:onClick},"← 뒤로");
}
function makeInput(placeholder,initVal,onDone){
  const inp=el("input",{class:"inp",placeholder:placeholder});
  inp.value=initVal||"";
  let c=false;
  inp.addEventListener("compositionstart",()=>c=true);
  inp.addEventListener("compositionend",()=>{c=false;if(onDone)onDone(inp.value);});
  inp.addEventListener("input",()=>{if(!c&&onDone)onDone(inp.value);});
  return inp;
}
function makeTextarea(placeholder,initVal,onDone){
  const t=el("textarea",{class:"textarea",placeholder:placeholder});
  t.value=initVal||"";
  let c=false;
  t.addEventListener("compositionstart",()=>c=true);
  t.addEventListener("compositionend",()=>{c=false;if(onDone)onDone(t.value);});
  t.addEventListener("input",()=>{if(!c&&onDone)onDone(t.value);});
  return t;
}
function makeWheel(items,selected,onSelect,width){
  const IH=44;
  const wrap=div({class:"wheel-wrap",style:{width:(width||80)+"px",height:(IH*5)+"px"}});
  const hl=div({style:{position:"absolute",top:(IH*2)+"px",left:"0",right:"0",height:IH+"px",background:"#4F46E515",borderTop:"1.5px solid #4F46E560",borderBottom:"1.5px solid #4F46E560",pointerEvents:"none",zIndex:"2",borderRadius:"10px"}});
  const ft=div({style:{position:"absolute",top:"0",left:"0",right:"0",height:(IH*2)+"px",background:"linear-gradient(to bottom,var(--surface),transparent)",pointerEvents:"none",zIndex:"3"}});
  const fb=div({style:{position:"absolute",bottom:"0",left:"0",right:"0",height:(IH*2)+"px",background:"linear-gradient(to top,var(--surface),transparent)",pointerEvents:"none",zIndex:"3"}});
  const scroll=div({class:"wheel-scroll",style:{height:"100%"}});
  scroll.appendChild(div({style:{height:IH+"px"}}));
  scroll.appendChild(div({style:{height:IH+"px"}}));
  items.forEach((item,i)=>{
    const it=div({class:"wheel-item"+(item===selected?" on":""),style:{height:IH+"px"}},String(item));
    it.addEventListener("click",()=>{onSelect(item);scroll.scrollTop=i*IH;});
    scroll.appendChild(it);
  });
  scroll.appendChild(div({style:{height:IH+"px"}}));
  scroll.appendChild(div({style:{height:IH+"px"}}));
  scroll.addEventListener("scroll",()=>{
    const i=Math.max(0,Math.min(items.length-1,Math.round(scroll.scrollTop/IH)));
    if(items[i]!==selected){selected=items[i];onSelect(items[i]);}

        }),
        S.error?div({class:"err"},S.error):null,
        btn(S.loading?"제출 중...":"투표 제출하기",()=>{if(!S.loading&&S.dates.every(d=>S.myVotes[d.id]))submitVote();},S.dates.every(d=>S.myVotes[d.id])&&!S.loading),
      ]);
    }
  }else if(S.view==="result"){
    content=div({style:{padding:"16px 20px"}},[
      S.confirmed?div({style:{background:"linear-gradient(135deg,#2DD4BF20,#4F46E515)",border:"1.5px solid #2DD4BF40",borderRadius:"16px",padding:"20px",marginBottom:"16px"}},[
        div({style:{fontSize:"11px",fontWeight:700,color:"var(--mint)",letterSpacing:".1em",marginBottom:"8px"}},"✓ 확정된 날짜"),
        div({style:{fontSize:"22px",fontWeight:900,marginBottom:"4px"}},S.confirmed.date),
        div({style:{fontSize:"13px",color:"var(--text2)",marginBottom:"12px"}},S.confirmed.time),
        S.roomInfo?.location?el("a",{href:S.roomInfo.location_url||"#",target:"_blank",style:{display:"inline-block",fontSize:"13px",color:"var(--mint)",textDecoration:"none",fontWeight:600,marginBottom:"12px"}},"📍 "+S.roomInfo.location):null,
        el("button",{class:"icon-btn",onclick:()=>{window.open("https://calendar.google.com/calendar/render?action=TEMPLATE&text="+encodeURIComponent((S.roomInfo?.band_name||"밴드")+" 합주")+"&location="+encodeURIComponent(S.roomInfo?.location||""),"_blank")}},"📅 캘린더에 추가"),
      ]):null,
      !S.confirmed&&best?div({style:{background:"linear-gradient(135deg,#4F46E520,#2DD4BF10)",border:"1.5px solid #4F46E540",borderRadius:"16px",padding:"20px",marginBottom:"16px"}},[
        div({style:{fontSize:"11px",fontWeight:700,color:"var(--indigo-light)",letterSpacing:".1em",marginBottom:"8px"}},"BEST DATE"),
        div({style:{fontSize:"22px",fontWeight:900,marginBottom:"4px"}},best.date),
        div({style:{fontSize:"13px",color:"var(--text2)",marginBottom:"12px"}},best.time+" · "+scoreFor(best.id)+"명 가능"),
        amHost?el("button",{style:{padding:"10px 20px",background:"var(--indigo)",border:"none",borderRadius:"10px",color:"#fff",fontSize:"13px",fontWeight:700,cursor:"pointer",fontFamily:"'Noto Sans KR',sans-serif"},onclick:()=>confirmDate(best)},"이 날로 확정 ✓"):div({style:{fontSize:"12px",color:"var(--text3)"}},"방장이 날짜를 확정할 수 있어"),
      ]):null,
      ...S.dates.map(d=>div({class:"card"},[
        div({style:{display:"flex",justifyContent:"space-between",marginBottom:"12px"}},[
          div({},[el("span",{style:{fontSize:"14px",fontWeight:700}},d.date),el("span",{style:{fontSize:"12px",color:"var(--text2)",marginLeft:"8px"}},d.time)]),
          div({style:{fontSize:"13px",color:"var(--text2)",fontWeight:600}},scoreFor(d.id)+"/"+voterNames.length),
        ]),
        div({style:{display:"flex",flexDirection:"column",gap:"8px"}},
          voterNames.length===0?[div({style:{fontSize:"13px",color:"var(--text3)"}},"아직 없어")]:
          voterNames.map(name=>{
            const v=S.votes[name]?.[d.id];
            return div({style:{display:"flex",alignItems:"center",gap:"10px"}},[
              el("span",{style:{fontSize:"13px",flex:1,fontWeight:name===S.myName?700:400}},name+(name===S.myName?" (나)":"")),
              el("span",{style:{fontSize:"11px",padding:"3px 10px",borderRadius:"20px",background:v?SC[v]+"25":"var(--surface2)",color:v?SC[v]:"var(--text3)",fontWeight:600}},v?SL[v]:"미응답"),
            ]);
          })
        ),
      ])),
      amHost?div({style:{marginTop:"8px"}},[
        div({style:{height:"1px",background:"var(--border)",margin:"8px 0 16px"}}),
        el("span",{class:"label"},"방장 메뉴"),
        !isClosed?btn("🔒 투표 마감",()=>{if(confirm("투표를 마감할까?"))closeVoting();},true,"danger"):el("span",{class:"badge badge-danger"},"투표 마감됨"),
      ]):null,
    ]);
  }else if(S.view==="members"){
    content=div({style:{padding:"16px 20px"}},[
      voterNames.length===0?div({style:{textAlign:"center",padding:"40px 0",color:"var(--text3)",fontSize:"14px"}},"아직 투표한 멤버가 없어"):null,
      ...voterNames.map(name=>div({class:"card",style:{display:"flex",alignItems:"center",gap:"14px",borderColor:name===S.myName?"#4F46E540":"var(--border-light)"}},[
        div({style:{width:"44px",height:"44px",borderRadius:"12px",background:name===S.myName?"var(--indigo-dim)":"var(--surface2)",border:"1.5px solid "+(name===S.myName?"var(--indigo)":"var(--border)"),display:"flex",alignItems:"center",justifyContent:"center",fontSize:"20px"}},EMO["기타(other)"]||"🎵"),
        div({style:{flex:1,fontSize:"14px",fontWeight:700}},name+(name===S.myName?" (나)":"")+(name===S.roomInfo?.host_name?" 👑":"")),
        el("span",{class:"badge badge-mint"},"참여중"),
      ])),
      div({class:"card",style:{marginTop:"8px"}},[
        el("span",{class:"label"},"초대 링크"),
        div({style:{background:"var(--bg)",borderRadius:"10px",padding:"12px",fontSize:"12px",color:"var(--text2)",marginBottom:"12px",wordBreak:"break-all",lineHeight:"1.7",border:"1px solid var(--border)"}},invLink),
        btn(S.inviteCopied?"✓ 복사됨!":"링크 복사하기",()=>{navigator.clipboard?.writeText(invLink);set({inviteCopied:true});setTimeout(()=>set({inviteCopied:false}),2000);},true,S.inviteCopied?"secondary":""),
      ]),
      btn("💰 합주비 정산",()=>set({settleModal:true,settleCost:"",settleCount:String(voterNames.length)}),true,"secondary"),
    ]);
  }else if(S.view==="journal"){
    const journals=S.journals||[];
    content=div({style:{padding:"16px 20px"}},[
      div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px"}},[
        el("span",{class:"label",style:{marginBottom:0}},"합주 일지 "+journals.length+"개"),
        el("button",{class:"btn sm",onclick:()=>set({journalModal:{},journalSetlist:"",journalMemo:"",journalTags:[],journalCost:"",journalMembers:""})},"+ 새 일지"),
      ]),
      journals.length===0?div({style:{textAlign:"center",padding:"48px 0"}},[div({style:{fontSize:"40px",marginBottom:"12px"}},"📝"),div({style:{fontSize:"14px",color:"var(--text2)",fontWeight:600}},"첫 합주 일지를 남겨봐"),div({style:{fontSize:"12px",color:"var(--text3)",marginTop:"6px"}},"셋리스트, 메모, 비용을 기록해")]):null,
      ...journals.map(j=>div({class:"card"},[
        div({style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"10px"}},[
          div({},[j.tags?div({style:{marginBottom:"6px"}},j.tags.split(",").filter(Boolean).map(t=>el("span",{class:"badge badge-indigo",style:{marginRight:"4px"}},t))):null,j.members?div({style:{fontSize:"12px",color:"var(--text2)",marginTop:"4px"}},"👥 "+j.members):null]),
          div({style:{display:"flex",gap:"6px",alignItems:"center"}},[
            j.total_cost?el("span",{class:"badge badge-mint"},"💰 "+(Math.ceil(parseInt(j.total_cost)/Math.max(1,voterNames.length))).toLocaleString()+"원"):null,
            el("button",{class:"icon-btn",onclick:()=>set({journalModal:j,journalSetlist:j.setlist||"",journalMemo:j.memo||"",journalTags:j.tags?j.tags.split(",").filter(Boolean):[],journalCost:j.total_cost||"",journalMembers:j.members||""})},"수정"),
          ]),
        ]),
        j.setlist?div({style:{background:"var(--bg)",borderRadius:"10px",padding:"12px",marginBottom:"10px",whiteSpace:"pre-wrap",fontSize:"13px",color:"var(--text)",lineHeight:"1.9",border:"1px solid var(--border)"}},j.setlist):null,
        j.memo?div({style:{fontSize:"13px",color:"var(--text2)",borderLeft:"2.5px solid var(--indigo)",paddingLeft:"12px",lineHeight:"1.8"}},j.memo):null,
      ])),
    ]);
  }
  return div({},[header,tabs,content,div({style:{textAlign:"center",padding:"48px 20px 20px",color:"var(--text3)",fontSize:"11px",fontWeight:500,letterSpacing:".05em"}},"잼잼 · MRDW 무릉도원")]);
}
render();
setInterval(()=>{if(S.screen==="app"&&S.roomId)loadRoom(S.roomId);},15000);
</script>
</body>
</html>
