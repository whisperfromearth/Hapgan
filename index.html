*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}

/* ── 배경 ── */
.bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
#bgCanvas{width:100%;height:100%;opacity:.4}

.wrap{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:0 0 80px;min-height:100vh}

input,button,textarea{font-family:'Noto Sans KR',sans-serif}
textarea{resize:vertical}

/* ── 인풋 ── */
.inp{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:16px;padding:15px 16px;color:var(--text);font-size:15px;outline:none;box-sizing:border-box;transition:border-color .2s,box-shadow .2s}
.inp::placeholder{color:var(--text3)}
.inp:focus{border-color:var(--p-border);box-shadow:0 0 0 4px var(--p-dim)}
.textarea{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:16px;padding:15px 16px;color:var(--text);font-size:15px;outline:none;box-sizing:border-box;resize:vertical;min-height:90px;line-height:1.8;transition:border-color .2s,box-shadow .2s}
.textarea:focus{border-color:var(--p-border);box-shadow:0 0 0 4px var(--p-dim)}
.textarea::placeholder,.inp::placeholder{color:var(--text3)}

/* ── 버튼 ── */
.btn{width:100%;padding:16px 20px;margin-top:10px;background:var(--p);border:none;border-radius:20px;cursor:pointer;color:#fff;font-size:15px;font-weight:700;font-family:'Noto Sans KR',sans-serif;transition:opacity .18s,transform .18s,box-shadow .18s;position:relative;overflow:hidden;letter-spacing:-.01em}
.btn:hover:not(.off){opacity:.9;transform:translateY(-1px);box-shadow:0 6px 20px rgba(91,82,240,.35)}
.btn:active:not(.off){transform:translateY(0);box-shadow:none;opacity:1}
.btn.off{background:var(--surface2);border:1.5px solid var(--border);color:var(--text3);cursor:default;pointer-events:none}
.btn.secondary{background:transparent;border:1.5px solid var(--border-md);color:var(--text2)}
.btn.secondary:hover:not(.off){border-color:var(--p-border);color:var(--text);box-shadow:none;transform:none;opacity:1}
.btn.danger{background:var(--danger-dim);border:1.5px solid rgba(224,85,85,.3);color:var(--danger)}
.btn.danger:hover:not(.off){opacity:.85;box-shadow:none}
.btn.mint{background:var(--p);color:#fff}
.btn.sm{padding:9px 18px;font-size:13px;width:auto;margin-top:0;border-radius:14px}

/* ── 카드 ── */
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:22px;padding:20px;margin-bottom:12px;box-shadow:0 2px 16px rgba(0,0,0,.3)}
.card-hover{transition:border-color .2s,transform .18s,box-shadow .18s;cursor:pointer}
.card-hover:hover{border-color:var(--p-border);transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.45)}
.glass{background:rgba(22,25,42,.75);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1.5px solid var(--border)}

/* ── 레이블 ── */
.label{font-size:11px;color:var(--text2);font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;display:block}

/* ── 탭 ── */
.tabs{display:flex;border-bottom:1.5px solid var(--border);overflow-x:auto;scrollbar-width:none;padding:0 20px}
.tabs::-webkit-scrollbar{display:none}
.tab{background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;padding:12px 14px 14px;font-size:13px;font-weight:600;color:var(--text3);font-family:'Noto Sans KR',sans-serif;white-space:nowrap;transition:color .2s;margin-bottom:-1.5px}
.tab.on{color:var(--p-light);border-bottom-color:var(--p)}

/* ── 롤 그리드 ── */
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.role-btn{padding:14px 0;border-radius:18px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;font-size:13px;font-weight:600;font-family:'Noto Sans KR',sans-serif;transition:all .18s}
.role-btn:hover{border-color:var(--p-border);color:var(--text)}
.role-btn.on{border-color:var(--p-border);background:var(--p-dim);color:var(--p-light);box-shadow:0 0 0 3px var(--p-soft)}

/* ── 캘린더 ── */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-hd{text-align:center;font-size:11px;padding:5px 0;font-weight:700;color:var(--text3)}
.cal-day{aspect-ratio:1;border-radius:12px;border:none;background:transparent;color:var(--text);cursor:pointer;font-size:13px;font-weight:500;font-family:'Noto Sans KR',sans-serif;transition:all .15s}
.cal-day:hover:not(.past):not(:empty){background:var(--surface2)}
.cal-day.sel{background:var(--p);color:#fff;font-weight:800;box-shadow:0 2px 10px rgba(91,82,240,.4)}
.cal-day.past{color:var(--text3);cursor:default}
.cal-day.sun{color:#d97b7b}
.cal-day.sat{color:var(--p-light)}

/* ── 모달 ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end;backdrop-filter:blur(10px)}
.modal{background:var(--surface);border-radius:32px 32px 0 0;padding:28px 24px 52px;width:100%;max-width:480px;margin:0 auto;border-top:1.5px solid var(--border);max-height:92vh;overflow-y:auto;box-shadow:0 -4px 40px rgba(0,0,0,.5)}
.modal-handle{width:40px;height:4px;background:var(--border-md);border-radius:2px;margin:0 auto 28px;display:block}

/* ── 휠 ── */
.wheel-wrap{position:relative;overflow:hidden}
.wheel-scroll{height:100%;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none}
.wheel-scroll::-webkit-scrollbar{display:none}
.wheel-item{display:flex;align-items:center;justify-content:center;scroll-snap-align:start;cursor:pointer;font-size:16px;color:var(--text3);font-weight:500;transition:color .15s}
.wheel-item.on{color:var(--text);font-weight:800}
.dur-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px}
.dur-btn{padding:9px 14px;border-radius:12px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;font-size:13px;font-weight:600;font-family:'Noto Sans KR',sans-serif;transition:all .15s}
.dur-btn:hover{border-color:var(--p-border)}
.dur-btn.on{border-color:var(--p-border);background:var(--p-dim);color:var(--p-light)}

/* ── 상태 버튼 ── */
.status-row{display:flex;gap:8px;margin-top:12px}
.status-btn{flex:1;padding:12px 0;border-radius:16px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;font-size:13px;font-weight:700;font-family:'Noto Sans KR',sans-serif;transition:all .18s}
.status-btn:hover{border-color:var(--border-md);color:var(--text)}

/* ── 배지 — 컬러 최소화 ── */
.badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;display:inline-block;letter-spacing:.02em}
.badge-indigo{background:var(--p-dim);color:var(--p-light);border:1px solid var(--p-border)}

.badge-mint{background:var(--p-dim);color:var(--p-light);border:1px solid var(--p-border)}

.badge-danger{background:var(--danger-dim);color:var(--danger);border:1px solid rgba(224,85,85,.25)}
.badge-gray{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}

/* ── 기타 ── */
.divider{height:1.5px;background:var(--border);margin:16px 0}
.err{font-size:13px;color:var(--danger);margin:8px 0;padding:12px 16px;background:var(--danger-dim);border-radius:14px;border:1px solid rgba(224,85,85,.2);font-weight:500}
.icon-btn{background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;padding:8px 14px;color:var(--text2);cursor:pointer;font-size:12px;font-weight:600;font-family:'Noto Sans KR',sans-serif;transition:all .18s}
.icon-btn:hover{border-color:var(--p-border);color:var(--text)}
.tag{display:inline-block;padding:7px 14px;border-radius:20px;font-size:12px;font-weight:600;margin:3px 3px 3px 0;cursor:pointer;border:1.5px solid var(--border);background:var(--surface2);color:var(--text2);font-family:'Noto Sans KR',sans-serif;transition:all .18s}

.room-card{background:var(--surface);border:1.5px solid var(--border);border-radius:20px;padding:16px 18px;margin-bottom:10px;cursor:pointer;transition:all .2s}

.prog-bar.on{background:var(--p)}
.page-header{padding:20px 20px 0;margin-bottom:24px}

/* ── 통계 ── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-card{background:var(--surface);border:1.5px solid var(--border);border-radius:20px;padding:18px;text-align:center}

/* ── 애니메이션 ── */

.spinner{width:40px;height:40px;border:2.5px solid var(--border);border-top-color:var(--p);border-radius:50%;animation:spin .8s linear infinite;margin:100px auto}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes stagger{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .35s ease forwards}
.stagger-1{animation:stagger .35s .04s both}
.stagger-2{animation:stagger .35s .09s both}
.stagger-3{animation:stagger .35s .14s both}
.stagger-4{animation:stagger .35s .19s both}
.stagger-5{animation:stagger .35s .24s both}

/* ── 히어로 ── */
.hero{padding:52px 20px 36px}
.hero-tag{display:inline-flex;align-items:center;gap:6px;background:var(--p-dim);border:1px solid var(--p-border);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:700;color:var(--p-light);letter-spacing:.04em;margin-bottom:20px}

.hero-gradient{color:var(--p-light)}

/* ── 피처 카드 ── */
.feature-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.member-bar-bg{height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;flex:1}
.member-bar-fill{height:100%;border-radius:3px;background:var(--p);transition:width .8s cubic-bezier(.34,1.56,.64,1)}

/* ── 리플 ── */
.ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.15);animation:ripple .5s linear;pointer-events:none}
@keyframes ripple{to{transform:scale(4);opacity:0}}

// ── 배경 캔버스 파티클
(function(){
  const canvas=document.getElementById("bgCanvas");
  const ctx=canvas.getContext("2d");
  let W,H,particles=[];
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  resize();window.addEventListener("resize",resize);
  for(let i=0;i<40;i++){
    particles.push({
      x:Math.random()*1000,y:Math.random()*1000,
      vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,
      r:Math.random()*1.5+.5,
      color:Math.random()>.5?"rgba(79,70,229,":"rgba(45,212,191,",
      a:Math.random()*.5+.1,
    });
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    // 연결선
    for(let i=0;i<particles.length;i++){
      for(let j=i+1;j<particles.length;j++){
        const dx=particles[i].x-particles[j].x,dy=particles[i].y-particles[j].y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<120){
          ctx.beginPath();
          ctx.strokeStyle="rgba(79,70,229,"+(1-dist/120)*.15+")";
          ctx.lineWidth=.5;
          ctx.moveTo(particles[i].x,particles[i].y);
          ctx.lineTo(particles[j].x,particles[j].y);
          ctx.stroke();
        }
      }
    }
    particles.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0||p.x>W)p.vx*=-1;
      if(p.y<0||p.y>H)p.vy*=-1;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=p.color+p.a+")";
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

function makeWheel(items,selected,onSelect,width){

const wrap=div({class:“wheel-wrap”,style:{width:(width||80)+“px”,height:(IH*5)+“px”}});

const fb=div({style:{position:“absolute”,bottom:“0”,left:“0”,right:“0”,height:(IH*2)+“px”,background:“linear-gradient(to top,var(–surface),transparent)”,pointerEvents:“none”,zIndex:“3”}});
const scroll=div({class:“wheel-scroll”,style:{height:“100%”}});
scroll.appendChild(div({style:{height:IH+“px”}}));scroll.appendChild(div({style:{height:IH+“px”}}));
items.forEach((item,i)=>{
const it=div({class:“wheel-item”+(item===selected?” on”:””),style:{height:IH+“px”}},String(item));
it.addEventListener(“click”,()=>{onSelect(item);scroll.scrollTop=i*IH;});
scroll.appendChild(it);
});
scroll.appendChild(div({style:{height:IH+“px”}}));scroll.appendChild(div({style:{height:IH+“px”}}));
scroll.addEventListener(“scroll”,()=>{
const i=Math.max(0,Math.min(items.length-1,Math.round(scroll.scrollTop/IH)));
